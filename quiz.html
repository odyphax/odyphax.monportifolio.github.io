<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Quiz simple</title>
</head>

<body>
    <script>
        // 1) Tableau quiz
        const quiz = [
            {
                texte: "Quelle est la capitale économique du Burundi ?",
                options: ["Gitega", "Bujumbura", "Ngozi"],
                reponseCorrecte: 1
            },
            {
                texte: "Combien de jours y a-t-il dans une semaine ?",
                options: ["5", "6", "7"],
                reponseCorrecte: 2
            },
            {
                texte: "Quel est le résultat de 5 + 3 ?",
                options: ["6", "7", "8"],
                reponseCorrecte: 2
            }
        ];

        // 2) afficherQuestion(question)
        function afficherQuestion(question) {
            let message = question.texte + "\n";
            message += "1) " + question.options[0] + "\n";
            message += "2) " + question.options[1] + "\n";
            message += "3) " + question.options[2];
            alert(message);
        }

        // 3) verifierReponse(question, choix)
        // choix = 1, 2 ou 3
        function verifierReponse(question, choix) {
            // Convertir choix (1..3) en index (0..2)
            const indexChoisi = choix - 1;
            return indexChoisi === question.reponseCorrecte;
        }

        // 4) jouerQuiz()
        function jouerQuiz() {
            let score = 0;
            const total = quiz.length;

            for (let i = 0; i < quiz.length; i++) {
                const question = quiz[i];

                afficherQuestion(question);

                // Demander une réponse valide (1..3)
                let choix;
                do {
                    choix = Number(prompt("Répondre : entrez 1, 2 ou 3"));
                } while (choix !== 1 && choix !== 2 && choix !== 3);

                if (verifierReponse(question, choix)) {
                    score++;
                    alert("✅ Correct !");
                } else {
                    const bonneReponse = question.options[question.reponseCorrecte];
                    alert("❌ Faux ! La bonne réponse était : " + bonneReponse);
                }
            }

            alert("Score : " + score + "/" + total + ", Bien joué !");
        }

        // Lancer le quiz
        jouerQuiz();
    </script>
</body>

</html>
